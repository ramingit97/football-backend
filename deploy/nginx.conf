server {
    listen 80;
    server_name topin.az www.topin.az;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name topin.az www.topin.az;

    ssl_certificate /etc/ssl/topin/cert.pem;
    ssl_certificate_key /etc/ssl/topin/key.pem;

    # Serve React build
    root /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 15MB
    client_max_body_size 15M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MinIO public files
    location /files/ {
        proxy_pass http://minio:9000/football-files/;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # WebSocket proxy (Socket.IO)
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600;
    }

    # SPA fallback — all unknown routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
